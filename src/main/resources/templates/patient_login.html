<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Patient Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand"
           th:href="@{/}">Digital Prescription</a>

        <div>
            <a class="btn btn-light btn-sm me-2"
               th:href="@{/admin/login}">Admin</a>
            <a class="btn btn-light btn-sm me-2"
               th:href="@{/doctor/login}">Doctor</a>
            <a class="btn btn-light btn-sm"
               th:href="@{/patient/login}">Patient</a>
        </div>
    </div>
</nav>

<div class="container mt-5">

    <div class="row justify-content-center">
        <div class="col-md-5">

            <div class="card shadow p-4">

                <h3 class="text-center text-success mb-4">
                    Patient Login
                </h3>

                <form th:action="@{/patient/login}" method="post">

                    <div class="mb-3">
                        <label>Patient ID</label>
                        <input type="number"
                               name="id"
                               class="form-control"
                               required>
                    </div>

                    <button type="submit"
                            class="btn btn-success w-100">
                        Login
                    </button>

                </form>

            </div>

        </div>
    </div>

</div>

</body>
</html>
