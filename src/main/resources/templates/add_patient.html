<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Patient</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <span class="navbar-brand">Digital Prescription</span>
    </div>
</nav>

<div class="container mt-5">

    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow p-4">

                <h3 class="text-center text-primary mb-4">
                    Add Patient
                </h3>

                <form th:action="@{/admin/savePatient}" method="post">

                    <!-- NAME -->
                    <div class="mb-3">
                        <label>Name</label>
                        <input type="text" name="name" class="form-control" required>
                    </div>

                    <!-- EMAIL -->
                    <div class="mb-3">
                        <label>Email</label>
                        <input type="email" name="email" class="form-control">
                    </div>

                    <!-- HEALTH -->
                    <div class="mb-3">
                        <label>Health Details</label>
                        <textarea name="healthDetails" class="form-control"></textarea>
                    </div>

                    <!-- 🔥 DOCTOR ASSIGN -->
                    <div class="mb-3">
                        <label>Assign Doctor</label>
                        <select name="doctorId" class="form-control" required>

                            <option value="">-- Select Doctor --</option>

                            <option th:each="doc : ${doctors}"
                                    th:value="${doc.id}"
                                    th:text="${doc.name}">
                            </option>

                        </select>
                    </div>

                    <!-- SAVE -->
                    <button class="btn btn-primary w-100">
                        Save Patient
                    </button>

                </form>

                <br>

                <a href="/admin/dashboard" class="btn btn-secondary w-100">
                    Back
                </a>

            </div>

        </div>
    </div>

</div>

</body>
</html>
