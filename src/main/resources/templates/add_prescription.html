<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Prescription</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="text-primary text-center mb-4">Add Prescription</h2>

        <form th:action="@{/doctor/savePrescription}" method="post">

            <!-- ✅ VERY IMPORTANT -->
            <input type="hidden" name="appointmentId" th:value="${appointmentId}">
            <input type="hidden" name="patientId" th:value="${patientId}">

            <div class="mb-3">
                <label>Medicines</label>
                <textarea name="medicines" class="form-control" required></textarea>
            </div>

            <div class="mb-3">
                <label>Dosage</label>
                <textarea name="dosage" class="form-control" required></textarea>
            </div>

            <div class="mb-3">
                <label>Next Visit Date</label>
                <input type="date" name="nextVisitDate" class="form-control">
            </div>

            <div class="mb-3">
                <label>Health Details</label>
                <textarea name="healthDetails" class="form-control"></textarea>
            </div>

            <button class="btn btn-success w-100">Save Prescription</button>

        </form>

    </div>

</div>

</body>
</html>
