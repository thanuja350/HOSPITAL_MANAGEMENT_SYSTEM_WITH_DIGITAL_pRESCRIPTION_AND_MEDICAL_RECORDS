<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Video Consultation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5 text-center">

    <h2 class="text-primary mb-4">Live Video Consultation</h2>

    <video id="video" width="500" height="350" autoplay class="border rounded shadow"></video>

    <br><br>

    <button class="btn btn-danger" onclick="stopVideo()">End Call</button>

</div>

<script>

    let video = document.getElementById("video");
    let stream;

    navigator.mediaDevices.getUserMedia({ video: true, audio: true })
        .then(s => {
            stream = s;
            video.srcObject = stream;
        })
        .catch(err => {
            alert("Camera access denied!");
        });

    function stopVideo() {

    if (stream) {
        stream.getTracks().forEach(track => track.stop());
    }

    let url = new URL(window.location.href);

    let patientId = url.searchParams.get("patientId");
    let appointmentId = url.searchParams.get("appointmentId");

    window.location.href =
        "/doctor/addPrescription?patientId=" + patientId +
        "&appointmentId=" + appointmentId;
}

</script>

</body>
</html>
