<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Payment Required</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <div class="card shadow p-5 text-center">

        <h3 class="text-danger mb-4">
            Payment Required
        </h3>

        <p>Prescription is available only after payment.</p>

        <form th:action="@{/patient/payNow}" method="post">

    <input type="hidden"
           name="patientId"
           th:value="${patientId}" />

    <button class="btn btn-success w-100">
        Pay Now
    </button>

</form>
        <br>

        <a th:href="@{/patient/dashboard/{id}(id=${patientId})}"
           class="btn btn-secondary">
            Back to Dashboard
        </a>

    </div>

</div>

</body>
</html>
