<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Consultation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <div class="card shadow p-4">

        <h3 class="text-primary mb-4">Enter Health Details</h3>

        <form th:action="@{/patient/saveConsultation}" method="post">

            <input type="hidden" name="patientId" th:value="${patient.id}"/>

            <div class="mb-3">
                <label>Symptoms</label>
                <textarea name="healthDetails"
                          class="form-control"
                          required></textarea>
            </div>

            <button class="btn btn-success">
                Submit & Notify Doctor
            </button>

        </form>

    </div>

</div>

</body>
</html>
